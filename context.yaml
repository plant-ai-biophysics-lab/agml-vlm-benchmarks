arabica_coffee_leaf_disease_classification: Arabica coffee leaves are susceptible to several visually distinct diseases and pests. Coffee leaf rust (caused by Hemileia vastatrix) first appears as small pale yellow spots on the underside of leaves that expand into powdery orange-yellow lesions up to 20 mm in diameter; the upper leaf surface shows chlorotic patches corresponding to the rust pustules beneath, and severe infection leads to premature defoliation. Cercospora leaf spot (brown eye spot, caused by Cercospora coffeicola) manifests as circular brown necrotic spots with a light-colored center surrounded by a purple-brown ring and yellow halo on the upper leaf surface. Phoma leaf spot presents as necrosis progressing from the leaf tip inward toward the base, with the affected tissue turning brown and dying progressively. Coffee leaf miner (Leucoptera coffeella) damage appears as serpentine yellowish trails or translucent mines beneath the leaf epidermis where larvae have fed on the mesophyll tissue. Healthy coffee leaves are uniformly dark green, glossy, and elliptical with smooth margins.
banana_leaf_disease_classification: Banana leaves can be affected by several diseases with distinct visual signatures. Sigatoka disease (caused by Mycosphaerella species) begins as small pale yellow-green streaks on the upper leaf surface that elongate and darken to brown or black with a yellow halo; in advanced stages, lesions coalesce into large necrotic areas causing significant leaf death. Black Sigatoka (M. fijiensis) produces darker, more rapidly expanding lesions than Yellow Sigatoka (M. musicola). Xanthomonas bacterial wilt (caused by Xanthomonas campestris pv. musacearum) causes yellowing and wilting of leaves starting from the margins inward, often with a characteristic asymmetric pattern; internal vascular tissue shows brown-yellow discoloration and bacterial ooze may be visible at cut surfaces. Healthy banana leaves are large, elongated, uniformly bright green with a prominent midrib and smooth, waxy surface.
bean_disease_uganda: Common bean leaves exhibit several characteristic disease symptoms. Angular leaf spot (caused by Pseudocercospora griseola) produces angular, dark brown to gray lesions that are bounded by leaf veins, giving them a distinctive geometric appearance; the lesions may have a darker border and, under humid conditions, develop grayish fungal sporulation on the lower leaf surface. Bean rust (caused by Uromyces appendiculatus) appears as small, circular, reddish-brown to dark brown pustules (uredia) on the lower leaf surface, often surrounded by a narrow yellow halo; corresponding yellow spots appear on the upper surface, and severely infected leaves become chlorotic and drop prematurely. Healthy bean leaves are trifoliate, medium green, with smooth to slightly hairy surfaces and no discoloration.
betel_leaf_disease_classification: Betel vine leaves are used as a chewing stimulant across South and Southeast Asia and are vulnerable to several foliar conditions. Bacterial leaf disease presents as dark, water-soaked lesions that expand rapidly and turn black, often with irregular margins; severely affected leaves show extensive dark necrotic patches and may emit an unpleasant odor. Fungal brown spot disease (caused by Colletotrichum or Cercospora species) appears as circular to irregular brown spots with concentric rings or darker margins scattered across the leaf surface; spots may coalesce under favorable humid conditions. Dried leaves show uniform browning, curling, and desiccation resulting from advanced disease, environmental stress, or senescence. Healthy betel leaves are heart-shaped, glossy, dark green with prominent venation and a smooth, slightly waxy surface.
blackgram_plant_leaf_disease_classification: Blackgram (urad) leaves display several characteristic disease symptoms. Anthracnose (caused by Colletotrichum species) produces circular to irregular dark brown to black sunken lesions on leaves, sometimes with concentric rings; lesions may have pinkish spore masses under humid conditions and veins may show dark discoloration. Leaf crinkle disease (viral, transmitted by whiteflies) causes puckering, crinkling, and distortion of leaf lamina with irregular blistering; leaves appear wrinkled with upward or downward curling of margins and may show dark green blisters against a lighter background. Powdery mildew (caused by Erysiphe polygoni) appears as white to grayish powdery fungal growth on both leaf surfaces; the coating begins as discrete patches and can cover entire leaves, which may eventually yellow and dry. Yellow mosaic disease (caused by Mungbean yellow mosaic virus, transmitted by whitefly Bemisia tabaci) produces bright yellow and green mosaic mottling patterns on leaves; affected leaves may be smaller with irregular yellow patches interspersed with green tissue. Healthy blackgram leaves are trifoliate, uniformly dark green with slight hairiness.
chilli_leaf_classification: Chilli pepper leaves can exhibit both disease and pest-related damage. Cercospora leaf spot (caused by Cercospora capsici) appears as circular to oval spots with light gray or white centers and dark brown to purple-brown margins; spots often have a characteristic "frog-eye" appearance and may cause leaves to yellow and drop. Mite and thrips damage manifests as silvery or bronze discoloration on the upper leaf surface from cellular damage caused by feeding; leaves may curl upward, become distorted, and show tiny necrotic speckling. Nutritional deficiency symptoms vary: nitrogen deficiency causes uniform yellowing starting from older leaves; iron deficiency shows interveinal chlorosis on young leaves with green veins retained; magnesium deficiency shows interveinal yellowing of older leaves. Powdery mildew (caused by Leveillula taurica) produces diffuse yellowish patches on the upper leaf surface corresponding to white powdery sporulation on the lower surface; unlike typical powdery mildews, the white coating is often more visible underneath. Healthy chilli leaves are lanceolate, smooth, medium to dark green with no discoloration.
orange_leaf_disease_classification: Citrus leaves exhibit a wide variety of disease and pest symptoms. Citrus canker (caused by Xanthomonas citri) produces raised, corky, crater-like brown lesions on leaves, often with a water-soaked margin and yellow halo; lesions are roughly circular and visible on both leaf surfaces. Citrus greening/Huanglongbing (HLB, associated with Candidatus Liberibacter) causes asymmetric blotchy mottling with irregular yellowing that does not follow vein patterns, unlike nutritional deficiencies; leaves may be small, upright, and show hardened thickening. Mealybug infestations appear as white, cottony, waxy masses on leaf undersides and along midribs, often accompanied by sooty mold from honeydew excretion. Dieback manifests as progressive browning and death of leaf tips and branch terminals, with affected tissue becoming dry and brittle. Powdery mildew shows as white to grayish powdery patches on young leaves and shoots. Shot hole symptoms appear as small necrotic spots where dead tissue drops out leaving circular perforations in the leaf. Spiny whitefly damage shows as small yellowish feeding spots on leaf surfaces with waxy white nymphs and pupae on undersides. Yellow dragon disease (another name for HLB) and general yellowing present as chlorotic leaves that may be uniform or patchy in discoloration. Healthy citrus leaves are leathery, glossy dark green, ovate with entire margins and a characteristic citrus fragrance when crushed.
coconut_tree_disease_classification: Coconut palm leaves and trunks display characteristic disease symptoms. Bud rot (caused by Phytophthora palmivora) begins with yellowing and wilting of the youngest central spear leaves, which turn brown and collapse; the apical bud becomes soft and rotten with a foul smell, and affected fronds drop prematurely. Gray leaf spot (caused by Pestalotiopsis palmarum) appears as small gray to tan oval spots with dark brown margins on leaflets; numerous spots may merge causing large necrotic areas and premature drying. Leaf rot presents as progressive browning and decay of leaflets, beginning from tips and margins, with tissue becoming soft and discolored. Stem bleeding (caused by Thielaviopsis paradoxa) shows as dark brown to black exudation (bleeding) from longitudinal cracks or wounds on the trunk; the oozing liquid stains the trunk surface and the surrounding bark tissue becomes reddish-brown and decayed. Bud root dropping leads to premature nut fall and wilting of fronds from fungal infection of the root and bud regions.
corn_maize_leaf_disease: Corn/maize leaves are affected by several visually distinct fungal diseases. Northern leaf blight (caused by Exserohilum turcicum) produces long, elliptical, grayish-green to tan cigar-shaped lesions typically 2.5 to 15 cm long that appear first on lower leaves; lesions darken as the fungus sporulates and may coalesce to blight entire leaves. Common rust (caused by Puccinia sorghi) appears as small, elongated, cinnamon-brown to reddish-brown pustules scattered on both leaf surfaces; pustules erupt through the epidermis and release powdery spores, and heavily infected leaves become chlorotic. Gray leaf spot (caused by Cercospora zeae-maydis) produces rectangular, grayish-tan lesions that are distinctly bounded by leaf veins, giving them a very regular, blocky appearance; lesions may be translucent when held to light and occur in parallel rows. Healthy corn leaves are long, broad, arching, bright green with a prominent midrib and smooth, waxy surface.
cucumber_disease_classification: Cucumber leaves and fruit are susceptible to diverse diseases. Anthracnose (caused by Colletotrichum orbiculare) produces circular, water-soaked spots on leaves that enlarge and turn tan to brown with dark borders; on fruit, sunken dark lesions with pinkish spore masses appear. Bacterial wilt (caused by Erwinia tracheiphila) causes rapid wilting of individual leaves or entire vines; leaves become dull green and flaccid, and when a stem is cut and squeezed, sticky bacterial strands can be pulled from the vascular tissue. Belly rot (caused by Rhizoctonia solani) affects fruit in contact with soil, producing water-soaked brown lesions on the underside of cucumbers that become sunken and firm. Downy mildew (caused by Pseudoperonospora cubensis) appears as angular, yellow to brown lesions bounded by leaf veins on the upper surface, with corresponding grayish-purple sporulation visible on the lower surface under humid conditions. Gummy stem blight (caused by Didymella bryoniae) produces circular tan to brown spots on leaves with concentric zonation, and brown to black cankers on stems that exude an amber gummy substance. Pythium fruit rot (caused by Pythium species) causes water-soaked, cottony soft rot on fruit that contacts wet soil. Fresh/healthy cucumber leaves are broad, lobed, medium green with a rough, hairy texture.
guava_disease_pakistan: Guava leaves and fruit are affected by several conditions. Canker (caused by Pestalotiopsis psidii) produces irregularly shaped brown to dark brown necrotic lesions on leaves, often starting from the margins or tips; lesions may have darker borders and can coalesce into large dead areas. Dot disease presents as numerous small, dark, circular spots scattered across the leaf surface, giving a stippled or dotted appearance. Mummification (caused by various fungi) affects fruit, causing them to dry, shrivel, and become hard and blackened; affected leaves near mummified fruit may show browning and desiccation. Guava rust (caused by Puccinia psidii) produces powdery yellow to orange-brown rust pustules, primarily on young leaves and shoots; heavily affected young leaves may become distorted and stunted. Healthy guava leaves are ovate, leathery, medium green with prominent parallel veins running perpendicular to the midrib.
java_plum_leaf_disease_classification: Java plum (jamun) leaves exhibit several foliar conditions. Bacterial spot produces small, dark, water-soaked lesions that become angular and necrotic with a brown to black appearance, often with a yellow halo; multiple spots may coalesce. Brown blight presents as large brown necrotic areas on leaves, often starting from the margins or tips and progressing inward; affected tissue becomes dry and papery. Dry leaves show complete or partial desiccation with uniform browning and brittleness from environmental stress, nutrient deficiency, or late-stage disease. Powdery mildew appears as white to grayish powdery fungal growth on the leaf surface, particularly on young, tender leaves; affected leaves may curl and new growth becomes stunted. Sooty mold forms as a black, superficial fungal coating on the leaf surface that grows on honeydew excreted by sucking insects; it does not penetrate the leaf tissue but reduces photosynthesis by blocking light. Healthy java plum leaves are oblong, glossy dark green, leathery with a smooth surface and entire margins.
onion_leaf_classification: Onion leaves (tubular, hollow scapes) display characteristic disease symptoms. Iris yellow spot virus (IYSV, transmitted by thrips) produces straw-colored to tan, diamond-shaped or elongated dry lesions on leaves and scapes; lesions may have green centers initially and are often oriented parallel to the leaf, eventually causing leaf tip dieback. Leaf blight (caused by Stemphylium vesicarium or Botrytis species) starts as small, light yellow to tan water-soaked spots that enlarge into elongated, bleached lesions often with a papery texture; lesions may girdle and kill entire leaves. Purple blotch (caused by Alternaria porri) produces large, elliptical lesions with distinctive purple-brown centers and concentric rings surrounded by a yellow zone; lesions are often sunken and appear first on older leaves. Healthy onion leaves are erect, tubular, waxy blue-green with a uniform color and smooth surface.
paddy_disease_classification: Rice leaves are subject to numerous diseases with varied visual presentations. Bacterial leaf blight (caused by Xanthomonas oryzae pv. oryzae) produces water-soaked lesions along leaf margins that expand into long, wavy, yellowish-white to grayish streaks; old lesions turn grayish-white with black dots from saprophytic fungi. Bacterial leaf streak (caused by X. oryzae pv. oryzicola) causes narrow, dark green, water-soaked, translucent interveinal streaks that turn brown; fine yellowish bacterial exudate beads may appear on lesion surfaces. Bacterial panicle blight (caused by Burkholderia glumae) affects grain filling, causing panicle branches to remain green while grains become discolored, shriveled, or empty. Rice blast (caused by Magnaporthe oryzae) produces spindle-shaped or diamond-shaped lesions with pointed ends, reddish-brown margins and grayish-white to tan centers; lesions typically measure 1 to 4 cm long. Brown spot (caused by Bipolaris oryzae) appears as small, circular to oval, dark brown spots with gray centers scattered uniformly across the leaf; numerous spots can kill entire leaves. Sheath blight (caused by Rhizoctonia solani) produces oval to irregular greenish-gray water-soaked lesions on the leaf sheath near the waterline that enlarge with gray-white centers and brown margins, often with irregular-shaped brown sclerotia. Leaf scald (caused by Microdochium oryzae) produces zonate lesions with alternating light and dark bands expanding from the leaf tip. Dead heart results from stem borer damage where the central shoot dies and becomes whitish while surrounding tillers remain green. Hispa beetle damage (Dicladispa armigera) leaves white parallel streaks or tunnels on the upper leaf surface from larval mining. Tungro virus disease (transmitted by leafhoppers) causes yellow to orange discoloration starting from leaf tips, stunted growth, and reduced tillering. Downy mildew presents as elongated yellow streaks with white to gray sporulation on the lower surface. Healthy rice leaves are narrow, linear, upright, and uniformly bright green.
rice_leaf_disease_classification: Rice leaves are subject to numerous diseases with varied visual presentations. Bacterial leaf blight (caused by Xanthomonas oryzae pv. oryzae) produces water-soaked lesions along leaf margins that expand into long, wavy, yellowish-white to grayish streaks; old lesions turn grayish-white with black dots from saprophytic fungi. Bacterial leaf streak (caused by X. oryzae pv. oryzicola) causes narrow, dark green, water-soaked, translucent interveinal streaks that turn brown; fine yellowish bacterial exudate beads may appear on lesion surfaces. Bacterial panicle blight (caused by Burkholderia glumae) affects grain filling, causing panicle branches to remain green while grains become discolored, shriveled, or empty. Rice blast (caused by Magnaporthe oryzae) produces spindle-shaped or diamond-shaped lesions with pointed ends, reddish-brown margins and grayish-white to tan centers; lesions typically measure 1 to 4 cm long. Brown spot (caused by Bipolaris oryzae) appears as small, circular to oval, dark brown spots with gray centers scattered uniformly across the leaf; numerous spots can kill entire leaves. Sheath blight (caused by Rhizoctonia solani) produces oval to irregular greenish-gray water-soaked lesions on the leaf sheath near the waterline that enlarge with gray-white centers and brown margins, often with irregular-shaped brown sclerotia. Leaf scald (caused by Microdochium oryzae) produces zonate lesions with alternating light and dark bands expanding from the leaf tip. Dead heart results from stem borer damage where the central shoot dies and becomes whitish while surrounding tillers remain green. Hispa beetle damage (Dicladispa armigera) leaves white parallel streaks or tunnels on the upper leaf surface from larval mining. Tungro virus disease (transmitted by leafhoppers) causes yellow to orange discoloration starting from leaf tips, stunted growth, and reduced tillering. Downy mildew presents as elongated yellow streaks with white to gray sporulation on the lower surface. Healthy rice leaves are narrow, linear, upright, and uniformly bright green.
papaya_leaf_disease_classification: Papaya leaves are large and palmately lobed, susceptible to several diseases. Anthracnose (caused by Colletotrichum gloeosporioides) produces irregular, water-soaked dark brown to black spots on leaves that enlarge and become dry and papery; on fruit, sunken dark lesions with pinkish spore masses develop. Bacterial spot (caused by Xanthomonas species) appears as small, angular, water-soaked lesions on the lower leaf surface that become translucent and turn brown to tan; lesions may merge into larger necrotic areas. Papaya leaf curl disease (caused by begomoviruses, transmitted by whitefly) causes severe downward curling and crinkling of leaves, vein thickening (enation), and reduced leaf size; affected plants become stunted and nonproductive. Papaya ringspot virus (PRSV) causes mosaic mottling of light and dark green on leaves, shoe-string-like narrow leaf lobes, and characteristic ring-shaped marks on fruit; leaves may show oily, water-soaked streaks on petioles. Healthy papaya leaves are large, deeply lobed, bright green with a smooth texture.
soybean_insect_classification: Soybean leaves can show characteristic pest damage patterns. Caterpillar (lepidopteran larvae) feeding produces irregular holes in the leaf lamina, often leaving only major veins intact (skeletonization) or creating ragged edges; different caterpillar species may produce window-pane feeding (eating one epidermal layer) or through-and-through holes, and frass (droppings) may be visible on leaves. Diabrotica speciosa (rootworm/leaf beetle) feeding produces a characteristic pattern of small, round to oblong holes scattered across the leaf surface, distinct from the irregular edges left by caterpillars; adult beetles are bright green with yellow spots and may be visible on the foliage. Healthy soybean leaves are trifoliate, medium green, broadly oval with smooth margins and a slightly hairy surface.
sugarcane_damage_usa: This dataset focuses on physical/mechanical damage to sugarcane billets (cut stem segments) rather than foliar disease. Cracked billets show visible longitudinal or transverse fractures in the rind with exposed internal pith tissue. Crushed billets exhibit deformation with flattened or collapsed rind sections and extruded or compacted pith. No-bud billets are segments where viable axillary buds have been removed or are absent, leaving smooth internode surfaces without the characteristic raised bud nodes. Two-bud billets show two intact, viable lateral buds at nodes along the billet length. Single damaged bud billets have one bud present but showing physical injury such as cracking, gouging, or partial removal. Undamaged billets display intact rind, properly spaced nodes with healthy buds, and clean-cut ends without splitting. These are typically dark-skinned cylindrical stem sections with a waxy or slightly rough exterior.
sunflower_disease_classification: Sunflower leaves can be affected by several fungal diseases. Downy mildew (caused by Plasmopara halstedii) appears as angular, chlorotic (yellowish) areas on the upper leaf surface bounded by veins, with corresponding white to grayish cottony fungal growth on the lower surface; severely affected leaves may curl downward and become stunted. Gray mold (caused by Botrytis cinerea) produces soft, water-soaked, brown lesions on leaves and flower heads that become covered with a distinctive fuzzy gray sporulation under humid conditions; affected tissue often becomes mushy and may develop sclerotia (hard black masses). Leaf scars represent healed or dried wound tissue on the leaf surface appearing as pale, thickened, dry patches or marks from prior physical damage or insect feeding. Fresh/healthy sunflower leaves are large, broadly ovate, rough-textured, and medium to dark green with serrated margins.
tea_leaf_disease_classification: Tea leaves are subject to both pathogenic diseases and pest damage. Algal leaf spot (caused by the parasitic alga Cephaleuros virescens) appears as raised, circular, velvety orange to greenish-gray patches on the upper leaf surface; older infections look lichen-like and grayish. Brown blight (caused by Colletotrichum camelliae) produces brown necrotic lesions with concentric rings on the leaf surface; lesions often start from leaf tips or edges and expand inward with irregular margins. Gray blight (caused by Pestalotiopsis theae) presents as grayish lesions with distinct brown margins on the leaf surface; as lesions coalesce, they form large necrotic patches that can kill entire leaves. Helopeltis (tea mosquito bug, Helopeltis theivora) damage appears as brownish to blackish feeding spots where the bug has pierced the leaf to suck sap; puncture marks expand into irregular dark necrotic patches, and affected leaves curl, wither, and fall prematurely. Red spot (caused by Phyllosticta theicola) produces small, reddish to reddish-brown circular spots on mature leaves that may have darker margins and a central lighter area. Healthy tea leaves are elliptical, leathery, dark green with serrated margins and a slightly glossy surface.
tomato_leaf_disease: Tomato leaves exhibit many visually distinctive disease and pest symptoms. Bacterial spot (caused by Xanthomonas species) produces small, dark, water-soaked lesions that become raised and scabby, often with a yellow halo; spots may coalesce and cause defoliation. Early blight (caused by Alternaria solani) creates brown, concentrically ringed "target-like" or "bull's-eye" lesions, typically appearing first on lower (older) leaves surrounded by a yellow halo. Late blight (caused by Phytophthora infestans) causes large, irregular, water-soaked, dark green to brown lesions that can rapidly engulf entire leaves; white fuzzy sporulation often appears on the lesion undersides under humid conditions. Leaf mold (caused by Passalora fulva) shows as pale green to yellow diffuse spots on the upper leaf surface with corresponding olive-green to brown velvety fungal growth on the lower surface. Septoria leaf spot (caused by Septoria lycopersici) produces numerous small, circular spots with gray or tan centers and dark borders, often starting on lower leaves. Spider mite (two-spotted, Tetranychus urticae) damage shows as fine yellowish stippling on the upper leaf surface from cellular feeding; heavy infestations produce bronzing, webbing, and defoliation. Target spot (caused by Corynespora cassiicola) produces brown concentric-ringed lesions similar to early blight but typically larger with more prominent zonation. Tomato mosaic virus causes mottled light and dark green mosaic patterns on leaves, sometimes with fern-like leaf distortion. Yellow leaf curl virus (transmitted by whiteflies) causes pronounced upward curling and cupping of leaves with yellowing of leaf margins and interveinal areas; plants become severely stunted. Healthy tomato leaves are compound (pinnate), medium green, with a distinctive tomato odor when crushed.
vine_virus_photo_dataset: Grapevine virus diseases produce characteristic foliar color changes. Grapevine leafroll-associated virus 3 (GLRaV-3) causes downward rolling of leaf margins and red to purple discoloration of interveinal areas in red-fruited cultivars, while veins remain green, creating a striking pattern; in white-fruited cultivars, leaves turn yellow rather than red with similar rolling. Red blotch disease (caused by Grapevine red blotch virus) produces irregular red blotches on the leaf blade, often along veins and in interveinal zones; the reddening pattern is less symmetrically interveinal than leafroll and may appear as patches or follow primary veins. "Other red" encompasses non-viral causes of red leaf symptoms including nutritional deficiency (phosphorus, magnesium), insect feeding damage, or natural senescence. Non-infected leaves are uniform green (in season), broadly lobed with toothed margins, changing to yellow or red uniformly in autumn.
plant_seedlings_aarhus: This dataset contains seedling-stage images of crops and weeds against soil backgrounds. Maize seedlings emerge with a single, rolled leaf that unfurls into a broad, linear blade with parallel venation. Common wheat seedlings form narrow, upright, linear leaves in a grass-like tuft. Sugar beet seedlings have distinctive spade-shaped, smooth, glossy cotyledons followed by oval true leaves with wavy margins. Scentless mayweed seedlings produce finely dissected, feathery leaves with thread-like segments. Common chickweed forms small, oval, paired opposite leaves on sprawling stems with a line of hairs along one side. Shepherd's purse seedlings produce a rosette of deeply lobed, dandelion-like leaves. Cleavers (goosegrass) seedlings show whorled, narrow, strap-shaped leaves with tiny hooked hairs. Charlock seedlings have broad, rounded cotyledons followed by irregularly lobed, coarse leaves with a large terminal lobe. Fat hen (lamb's quarters) seedlings have diamond-shaped leaves with a mealy grayish-white coating, especially on undersides. Small-flowered cranesbill produces palmately lobed, rounded leaves on slender stems. Black-grass and loose silky-bent are grass seedlings distinguished by leaf width, auricle shape, and growth habit — black-grass has broader, darker leaves while loose silky-bent is finer and paler.
crop_weeds_greece: This dataset focuses on early-growth crop and weed identification in Mediterranean agricultural settings. Black nightshade (Solanum nigrum) seedlings have oval to diamond-shaped, slightly hairy, dark green leaves on branching stems; they can be confused with young tomato plants but lack the tomato's distinctive odor and have smoother leaf margins. Velvet leaf (Abutilon theophrasti) is distinctive with large, heart-shaped leaves covered in dense, soft, velvety hairs; the leaf surface appears pale green and feels fuzzy. Cotton (Gossypium spp.) seedlings have characteristic palmate leaves with 3-5 pointed lobes and scattered dark oil glands visible as tiny dots on the leaf surface. Tomato (Solanum lycopersicum) seedlings have compound, pinnate leaves with serrated leaflets and a characteristic strong odor; young plants have hairy stems and leaves.
rangeland_weeds_australia: Australian rangeland weeds are invasive species photographed in natural field settings. Chinee apple (Ziziphus mauritiana) is a thorny shrub/tree with glossy, oval leaves that have three prominent veins from the base and finely serrated margins. Lantana (Lantana camara) has opposite, ovate, rough-textured leaves with serrated edges and square stems; leaves have a distinctive pungent odor when crushed. Parkinsonia (Parkinsonia aculeata) has distinctive long, thin, drooping pinnate leaves with tiny paired leaflets along a flattened green rachis, and spiny stipules. Parthenium (Parthenium hysterophorus) has deeply lobed, pale green leaves resembling carrot foliage, covered with fine hairs. Prickly acacia (Vachellia nilotica) has bipinnate compound leaves with many small leaflets and paired thorns at nodes. Rubber vine (Cryptostegia grandiflora) is a climbing vine with opposite, glossy, dark green, elliptical leaves with milky latex when damaged. Siam weed (Chromolaena odorata) has opposite, triangular to ovate leaves with three prominent veins and serrated margins. Snake weed (Stachytarpheta spp.) produces elongate, serrated, medium-green opposite leaves on square stems.
soybean_weed_uav_brazil: This dataset uses UAV (drone) top-down imagery of soybean fields in Brazil, where classification is at a coarse morphological level rather than species level. Broadleaf weeds appear in overhead images as plants with wide, spreading leaf canopies that differ from the trifoliate pattern of soybean; they often have irregular shapes and varying green tones. Grass weeds appear as narrow, linear-leaved plants with an upright or tufted growth habit, creating elongated or fan-shaped patterns visible from above. Soil patches appear as exposed brown, tan, or reddish earth between crop rows without significant vegetation cover. Soybean plants show the characteristic trifoliate leaf arrangement with rounded leaflets forming a relatively uniform canopy pattern in planted rows. Note that these images are captured at a different scale and perspective (nadir UAV) compared to ground-level datasets.