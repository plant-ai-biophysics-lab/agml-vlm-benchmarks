yolo:
  # transform_config.yaml
  imgsz: 224

  # Flip probabilities
  fliplr: 0.5
  flipud: 0.1

  # HSV augmentation (color jitter strength)
  hsv_h: 0.02
  hsv_s: 0.4
  hsv_v: 0.4

  # Random erasing probability
  erasing: 0.2

  # Number of worker threads for DataLoader
  workers: 4

  # Training settings
  epochs: 30
  batch: 32

siglip2:
  dtype: float16
  attn_implementation: sdpa
  batch_size: 12

  # prompt template for classification
  prompt_template: "This photo contains: {}."

  # LoRA configuration
  lora_config:
    r: 6
    lora_alpha: 12
    lora_dropout: 0.1
    bias: "none"
    target_modules: ["q_proj", "v_proj"]
    modules_to_save: [] # Empty to keep zero-shot capability (don't train classifier)

  # Trainer configuration
  trainer_config:
    num_train_epochs: 3
    per_device_train_batch_size: 12
    gradient_accumulation_steps: 4
    optim: "adamw_torch_fused"
    learning_rate: 1.0e-3
    weight_decay: 0.02
    warmup_steps: 50
    fp16: True
    label_names: ["labels"]

llava_next:
  dtype: bfloat16
  attn_implementation: sdpa
  batch_size: 8

  # prompt template for classification (uses {classes} placeholder)
  # prompt_template: "What is shown in this image? Choose one: {classes}. Answer with only the class name."
  # prompt_template: "Respond in one sentence: What disease, pest, damage type, or other stress, if any, is exhibited in this image of a {plant_type} plant?"
  # prompt_template: "Respond in one sentence: What plant or weed species, if any, is shown in this image?"
  prompt_template: "Classify this image into one of the following categories: {classes}. Respond with ONLY the category name, nothing else."

  mcqa_options:
    options_within_dataset: True
    mcqa_num_choices: 5 # if options_within_dataset is False, number of random choices to sample

  lora_config:
    r: 8
    lora_alpha: 16
    lora_dropout: 0.05
    bias: "none"
    target_modules: ["q_proj", "v_proj"]
    modules_to_save: ["CAUSAL_LM"]

  trainer_config:
    num_train_epochs: 1
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 8
    optim: "adamw_torch_fused"
    learning_rate: 2.0e-4
    logging_steps: 10
    save_strategy: "epoch"
    save_steps: 20
    bf16: True
    max_grad_norm: 0.3
    warmup_ratio: 0.03

qwen_vl:
  dtype: bfloat16
  # attn_implementation: sdpa
  batch_size: 1

  # Image size control: set min_pixels == max_pixels to force a fixed resolution.
  # Qwen2.5-VL uses dynamic tiling; pixels refer to total pixel count (height * width).
  # Example: 448*448 = 200704 for a fixed 448x448 equivalent.
  # Set to null to use processor defaults (dynamic resolution).
  min_pixels: 200704  # 448 * 448
  max_pixels: 200704  # 448 * 448

  # prompt template for classification (uses {classes} placeholder)
  # prompt_template: "What is shown in this image? Choose one: {classes}. Answer with only the class name."
  # prompt_template: "Respond in one sentence: What disease, pest, damage type, or other stress, if any, is exhibited in this image of a {plant_type} plant?"
  # prompt_template: "Respond in one sentence: What plant or weed species, if any, is shown in this image?"
  # prompt_template: "Classify this image into one of the following categories: {classes}. Respond with ONLY the category name, nothing else."
  prompt_template: "Classify this image of a {plant_type} plant into one of the following categories: {classes}. Respond with ONLY the category name, nothing else."
  # prompt_template: "Respond briefly: You are an agricultural expert. Given the image please define what disease, pest, damage, or other stress, if any, is exhibited in this image of a {plant_type} plant?"

  mcqa_options:
    options_within_dataset: True
    mcqa_num_choices: 5 # if options_within_dataset is False, number of random choices to sample

  context_options:
    max_num_context: 1 # 1 if you want the context to only contain the same class
    max_num_example: 1

  lora_config:
    r: 8
    lora_alpha: 16
    lora_dropout: 0.05
    bias: "none"
    target_modules: ["q_proj", "v_proj"]
    modules_to_save: ["CAUSAL_LM"]

  trainer_config:
    num_train_epochs: 1
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 8
    optim: "adamw_torch_fused"
    learning_rate: 2.0e-4
    logging_steps: 10
    save_strategy: "epoch"
    save_steps: 20
    bf16: True
    max_grad_norm: 0.3
    warmup_ratio: 0.03

