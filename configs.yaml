yolo:
  # transform_config.yaml
  imgsz: 224

  # Flip probabilities
  fliplr: 0.5
  flipud: 0.1

  # HSV augmentation (color jitter strength)
  hsv_h: 0.02
  hsv_s: 0.4
  hsv_v: 0.4

  # Random erasing probability
  erasing: 0.2

  # Number of worker threads for DataLoader
  workers: 4

  # Training settings
  epochs: 30
  batch: 32

siglip2:

  dtype: float16
  attn_implementation: sdpa
  batch_size: 12

  # prompt template for classification
  prompt_template: "This photo contains: {}."

  # LoRA configuration
  lora_config:
    r: 8
    lora_alpha: 16
    lora_dropout: 0.1
    bias: "none"
    target_modules: ["q_proj", "v_proj"]
    modules_to_save: ["classifier"]

  # Trainer configuration
  trainer_config:
    num_train_epochs: 1
    per_device_train_batch_size: 12
    gradient_accumulation_steps: 4
    optim: "adamw_torch_fused"
    learning_rate: 1.0e-3
    weight_decay: 0.02
    warmup_steps: 50
    logging_steps: 10
    save_strategy: "epoch"
    fp16: True
    label_names: ["labels"]

llava_next:

  dtype: bfloat16
  attn_implementation: sdpa
  batch_size: 1  # LLaVa-Next processes images one at a time due to conversational nature
  
  # prompt template for classification (uses {classes} placeholder)
  prompt_template: "What is shown in this image? Choose one: {classes}. Answer with only the class name."

  lora_config:
    r: 8
    lora_alpha: 16
    lora_dropout: 0.05
    bias: "none"
    target_modules: ["q_proj", "v_proj"]
    modules_to_save: ["CAUSAL_LM"]

  trainer_config:
    num_train_epochs: 1
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 8
    optim: "adamw_torch_fused"
    learning_rate: 2.0e-4
    logging_steps: 10
    save_strategy: "epoch"
    save_steps: 20
    bf16: True
    max_grad_norm: 0.3
    warmup_ratio: 0.03

